name: deeplol
description: DeepLoL — генератор мемных подписей с AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  image: ^4.1.0
  image_gallery_saver: ^2.0.3
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.0
  share_plus: ^9.0.0
  cached_network_image: ^3.3.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/templates/meme_templates.json
